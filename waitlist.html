<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>Waitlist — Bump & Grind R&B Day Party · June 21</title>
<meta name="description" content="June 21st is sold out. Join the waitlist and we'll reach out if a ticket opens up.">
<meta property="og:title" content="Join the Waitlist — B&G R&B Day Party June 21">
<meta property="og:description" content="Sold out. Drop your info and we'll reach out if a ticket opens up.">
<meta property="og:image" content="https://www.bumpandgrindhfx.com/IMAGES/BUMPANDGRIND-OG.jpg">
<meta property="og:url" content="https://www.bumpandgrindhfx.com/waitlist">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blush:      #d97b63;
    --blush-mid:  #c4624a;
    --plum:       #1a0410;
    --white:      #ffffff;
    --muted:      rgba(255,255,255,0.45);
    --display:    'Bebas Neue', sans-serif;
    --sans:       'Outfit', sans-serif;
  }

  html, body {
    height: 100%;
    min-height: 100vh;
    width: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: var(--sans);
    background-color: var(--plum);
    background-image: url('IMAGES/WAITLISTHEADER.jpg');
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center top;
    position: relative;
  }

  /* Dark overlay so text pops over the photo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      160deg,
      rgba(15, 2, 10, 0.88) 0%,
      rgba(60, 10, 30, 0.80) 50%,
      rgba(15, 2, 10, 0.92) 100%
    );
    z-index: 0;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
  }

  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
    text-align: center;
  }

  /* ── LOGO ── */
  .logo {
    width: clamp(160px, 40vw, 280px);
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.1s;
    filter: drop-shadow(0 4px 32px rgba(0,0,0,0.6));
  }

  /* ── BADGE ── */
  .badge {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 0.22em;
    color: var(--plum);
    background: var(--blush);
    padding: 5px 18px 3px;
    margin-bottom: 28px;
    display: inline-block;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.2s;
  }

  /* ── HEADLINE ── */
  .headline {
    font-family: var(--display);
    font-size: clamp(56px, 15vw, 110px);
    line-height: 0.88;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards 0.3s;
  }

  .headline em {
    color: var(--blush);
    font-style: normal;
  }

  /* ── EVENT INFO ── */
  .event-info {
    margin-top: 20px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.4s;
  }

  .event-title {
    font-family: var(--display);
    font-size: clamp(14px, 3vw, 18px);
    letter-spacing: 0.2em;
    color: var(--white);
    margin-bottom: 8px;
  }

  .event-details {
    font-size: 13px;
    color: var(--white);
    letter-spacing: 0.1em;
    font-weight: 300;
    line-height: 1.8;
  }

  /* ── FORM ── */
  .form-wrap {
    width: 100%;
    max-width: 400px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }

  .form-label {
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 14px;
    display: block;
  }

  #waitlistForm {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  #waitlistForm input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-bottom: none;
    color: var(--white);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 300;
    padding: 15px 18px;
    outline: none;
    transition: background 0.2s, border-color 0.2s;
    letter-spacing: 0.03em;
    -webkit-appearance: none;
  }

  #waitlistForm input:last-of-type {
    border-bottom: 1px solid rgba(255,255,255,0.15);
  }

  #waitlistForm input::placeholder {
    color: rgba(255,255,255,0.28);
  }

  #waitlistForm input:focus {
    background: rgba(217,123,99,0.1);
    border-color: var(--blush);
    z-index: 1;
    position: relative;
  }

  #waitlistForm button[type="submit"] {
    width: 100%;
    margin-top: 10px;
    background: var(--blush);
    border: none;
    color: var(--plum);
    font-family: var(--display);
    font-size: 20px;
    letter-spacing: 0.18em;
    padding: 16px 24px 13px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  #waitlistForm button[type="submit"]:hover {
    background: #e8906f;
    transform: translateY(-1px);
  }

  #waitlistForm button[type="submit"]:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* ── FINE PRINT ── */
  .fine-print {
    margin-top: 18px;
    font-size: 11px;
    color: rgba(255,255,255,1);
    letter-spacing: 0.05em;
    line-height: 1.7;
  }

  .fine-print a {
    color: var(--white);
    text-decoration: none;
  }

  .fine-print a:hover {
    text-decoration: underline;
  }

  /* ── FOOTER ── */
  .footer-link {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    text-decoration: none;
    z-index: 10;
    transition: color 0.2s;
    white-space: nowrap;
  }

  .footer-link:hover { color: var(--blush); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .page { padding: 48px 20px 100px; }
    .logo { margin-bottom: 28px; }
  }
</style>
</head>
<body>

<div class="page">

  <img
    src="IMAGES/BUMPANDGRIND-MAIN-LOGO.png"
    alt="Bump & Grind"
    class="logo"
  >

  <h1 class="headline">JOIN<br>THE <em>WAITLIST.</em></h1>

  <div class="event-info">
    <p class="event-title">BUMP &amp; GRIND: R&amp;B DAY PARTY</p>
    <p class="event-details">
      SUNDAY, JUNE 21ST · 4PM – 8PM<br>
      THE PINT ROOFTOP PATIO · DOWNTOWN HALIFAX
    </p>
  </div>

  <div class="form-wrap">
    <span class="form-label">We'll reach out if a ticket opens up</span>

    <form id="waitlistForm" action="https://api.web3forms.com/submit" method="POST">
      <!-- Web3Forms Access Key -->
      <input type="hidden" name="access_key" value="b6fb76de-b533-4d31-98c4-b805f0e711e1">
      
      <!-- Redirects user back to waitlist page after successful submission -->
      <input type="hidden" name="redirect" value="https://www.bumpandgrindhfx.com/waitlist">
      
      <!-- Anti-Spam Honeypot -->
      <input type="checkbox" name="botcheck" class="hidden" style="display: none;">
      
      <input type="hidden" name="event" value="June 21 Patio Party Waitlist">
      <input type="text"  name="name"  placeholder="FIRST NAME"     autocomplete="given-name" required>
      <input type="email" name="email" placeholder="EMAIL ADDRESS"  autocomplete="email"      required>
      <button type="submit">COUNT ME IN</button>
    </form>

    <p class="fine-print">
      We'll only contact you if a ticket opens up. No spam, ever.<br>
      <a href="https://www.bumpandgrindhfx.com">← Back to bumpandgrindhfx.com</a>
    </p>
  </div>

</div>

</body>
</html>
